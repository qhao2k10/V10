name: Build LQH Droid Optimizer V10

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare V10 source
        run: |
          set -e
          if [ -f "LQH_DROID_OPTIMIZER_V10_SOURCE.zip" ]; then
            unzip -o "LQH_DROID_OPTIMIZER_V10_SOURCE.zip"
          elif [ -f "LQH_DROID_OPTIMIZER_V10_GITHUB_ACTIONS_BUNDLE.zip" ]; then
            unzip -o "LQH_DROID_OPTIMIZER_V10_GITHUB_ACTIONS_BUNDLE.zip"
            unzip -o "LQH_DROID_OPTIMIZER_V10_SOURCE.zip"
          else
            echo "Missing LQH_DROID_OPTIMIZER_V10_SOURCE.zip or LQH_DROID_OPTIMIZER_V10_GITHUB_ACTIONS_BUNDLE.zip"
            exit 1
          fi
          ls -la
          ls -la LQH_GameSpace_NoRoot

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: LQH_GameSpace_NoRoot
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LQH-DROID-OPTIMIZER-V10-debug-apk
          path: LQH_GameSpace_NoRoot/app/build/outputs/apk/debug/app-debug.apk
